name: Deploy Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy app to staging
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.VPS_PORT }}" \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "mkdir -p /var/www/bestcopro-staging/app"

          rsync -rz --links --times --delete \
            --no-owner --no-group --no-perms --omit-dir-times \
            --exclude ".git/" \
            --filter "protect /config/db.php" \
            --filter "hide /config/db.php" \
            --exclude "upload/" \
            --exclude "justificatifs/" \
            --exclude "*.apk" \
            --exclude "*.sql" \
            --exclude "*.log" \
            --exclude "error_log" \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            ./app/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/bestcopro-staging/app/
