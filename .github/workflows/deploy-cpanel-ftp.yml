name: Deploy to cPanel via FTP

on:
  push:
    branches:
      - main
      - staging

concurrency:
  group: cpanel-ftp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Get the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install lftp
        run: |
          sudo find /etc/apt/sources.list.d -type f \( -name "*azure*" -o -name "*microsoft*" \) -delete
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy changed app files to cPanel
        timeout-minutes: 5
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          BEFORE_SHA: ${{ github.event.before }}
          FTP_TARGET_DIR: ${{ secrets.FTP_TARGET_DIR }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          is_excluded() {
            case "$1" in
              app/config/db.php|app/upload/*|app/justificatifs/*|*.sql|*.log|*/error_log|error_log)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          quote_lftp() {
            printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'
          }

          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            git ls-files -z app > /tmp/app-changes.z
          else
            git diff --name-status -z "$BEFORE_SHA" "$AFTER_SHA" -- app > /tmp/app-changes.z
          fi

          if [ ! -s /tmp/app-changes.z ]; then
            echo "No app changes to deploy."
            exit 0
          fi

          cat > /tmp/deploy.lftp <<'LFTP'
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set ftp:use-mlsd no
          set ssl:verify-certificate no
          set cmd:fail-exit yes
          set net:max-retries 1
          set net:timeout 15
          set net:reconnect-interval-base 5
          set net:reconnect-interval-multiplier 1
          set ftp:list-options -a
          LFTP

          FTP_TARGET_DIR="${FTP_TARGET_DIR:-}"
          if [ -n "$FTP_TARGET_DIR" ]; then
            target_candidates=("$FTP_TARGET_DIR")
          else
            target_candidates=("public_html/app" "app" ".")
          fi

          selected_target=""
          for target_dir in "${target_candidates[@]}"; do
            cat > /tmp/check-target.lftp <<LFTP
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set ftp:use-mlsd no
          set ssl:verify-certificate no
          set cmd:fail-exit yes
          set net:max-retries 1
          set net:timeout 10
          cd "$(quote_lftp "$target_dir")"
          pwd
          bye
          LFTP
            if timeout 45s lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" < /tmp/check-target.lftp; then
              selected_target="$target_dir"
              break
            fi
          done

          if [ -z "$selected_target" ]; then
            echo "No valid FTP target directory found. Set the FTP_TARGET_DIR secret to the cPanel app directory."
            exit 1
          fi

          echo "Using FTP target: $selected_target"
          printf 'cd "%s"\n' "$(quote_lftp "$selected_target")" >> /tmp/deploy.lftp
          printf 'pwd\n' >> /tmp/deploy.lftp

          add_upload() {
            local local_path="$1"
            local remote_path="${local_path#app/}"
            local remote_dir

            if is_excluded "$local_path" || [ ! -f "$local_path" ]; then
              return
            fi

            remote_dir="$(dirname "$remote_path")"
            if [ "$remote_dir" != "." ]; then
              printf 'set cmd:fail-exit no\n' >> /tmp/deploy.lftp
              printf 'mkdir -p "%s"\n' "$(quote_lftp "$remote_dir")" >> /tmp/deploy.lftp
              printf 'set cmd:fail-exit yes\n' >> /tmp/deploy.lftp
            fi
            printf 'put -O "%s" "%s"\n' "$(quote_lftp "$remote_dir")" "$(quote_lftp "$local_path")" >> /tmp/deploy.lftp
          }

          add_delete() {
            local local_path="$1"
            local remote_path="${local_path#app/}"

            if is_excluded "$local_path"; then
              return
            fi

            printf 'rm -f "%s"\n' "$(quote_lftp "$remote_path")" >> /tmp/deploy.lftp
          }

          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            while IFS= read -r -d '' path; do
              add_upload "$path"
            done < /tmp/app-changes.z
          else
            while IFS= read -r -d '' status; do
              case "$status" in
                A|M|T)
                  IFS= read -r -d '' path
                  add_upload "$path"
                  ;;
                D)
                  IFS= read -r -d '' path
                  add_delete "$path"
                  ;;
                R*|C*)
                  IFS= read -r -d '' old_path
                  IFS= read -r -d '' new_path
                  add_delete "$old_path"
                  add_upload "$new_path"
                  ;;
                *)
                  IFS= read -r -d '' path
                  add_upload "$path"
                  ;;
              esac
            done < /tmp/app-changes.z
          fi

          echo "bye" >> /tmp/deploy.lftp
          timeout 180s lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" < /tmp/deploy.lftp
