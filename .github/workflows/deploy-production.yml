name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to production
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "wp-config.php" \
            --exclude "wp-admin/" \
            --exclude "wp-includes/" \
            --exclude "app/config/db.php" \
            --exclude "wp-content/plugins/" \
            --exclude "wp-content/themes/woodmart/" \
            --exclude "wp-content/themes/twentytwenty*/" \
            --exclude "wp-content/uploads/" \
            --exclude "wp-content/cache/" \
            --exclude "*.sql" \
            --exclude "*.log" \
            --exclude "error_log" \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/bestcopro/
